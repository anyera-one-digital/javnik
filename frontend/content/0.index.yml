navigation: false
faq:
  title: Часто задаваемые вопросы
  description: Ответы на самые популярные вопросы о наших тарифных планах и услугах.
  items:
    - label: Это безопасный сервис?
      content: Да, мы используем современные технологии шифрования и следуем лучшим практикам безопасности для защиты ваших данных.
    - label: Как я могу отменить подписку?
      content: Вы можете отменить подписку в любое время в разделе настроек вашего аккаунта. Отмена вступит в силу в конце текущего платежного периода.
    - label: Как работает бесплатный пробный период?
      content: Бесплатный пробный период длится 14 дней и дает вам полный доступ ко всем функциям выбранного плана. Кредитная карта не требуется.
    - label: Могу ли я изменить план позже?
      content: Да, вы можете перейти на другой план в любое время. Разница в стоимости будет пропорционально рассчитана.
    - label: Вы предлагаете возврат средств?
      content: Да, мы предлагаем возврат средств в течение 30 дней с момента покупки, если вы не удовлетворены нашим сервисом.
    - label: Вы предлагаете поддержку?
      content: Да, мы предлагаем поддержку по email для всех планов и приоритетную поддержку для премиум планов.
