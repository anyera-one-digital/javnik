sections:
  - title: Для кого создан этот сервис?
    description: Идеально подходит для самозанятых и частных практиков, которые хотят упорядочить запись и больше сосредоточиться на своей работе, а не на администрировании.
    id: features
    orientation: horizontal
    image: /images/portfolio/portfolio-1.png
    features:
      - name: Косметологи, мастера ногтевого сервиса, бровисты, парикмахеры
        description: Управляйте записями клиентов, расписанием и услугами в одном месте.
        icon: i-lucide-scissors
      - name: Массажисты, остеопаты, фитнес-тренеры, йога-инструкторы
        description: Организуйте свой прием и освободите время для работы с клиентами.
        icon: i-lucide-heart-pulse
      - name: Репетиторы, психологи, коучи, консультанты
        description: Упростите процесс записи и управления сессиями с клиентами.
        icon: i-lucide-graduation-cap
      - name: Фотографы, визажисты, организаторы праздников
        description: Контролируйте все ваши проекты и встречи в удобном календаре.
        icon: i-lucide-camera
      - name: И всех, кто ведет личный прием и ценит свое время
        description: Сосредоточьтесь на том, что вы делаете лучше всего, а мы позаботимся об организации.
        icon: i-lucide-users
  - title: Вы больше никогда...
    description: Решите проблемы, с которыми сталкивается каждый специалист при работе с клиентами.
    orientation: horizontal
    reverse: true
    image: /images/portfolio/portfolio-2.png
    features:
      - name: ...не потеряете запись в личных сообщениях или комментариях
        description: Все записи хранятся в одном месте и всегда под рукой.
        icon: i-lucide-message-square
      - name: ...не потратите 15 минут на телефонный звонок только чтобы согласовать время
        description: Клиенты сами выбирают удобное время через ваш календарь.
        icon: i-lucide-phone-off
      - name: ...не столкнетесь с пустым окном из-за отмены в последний момент (особенно с функцией предоплаты)
        description: Предоплата гарантирует серьезность намерений клиента и защищает ваше время.
        icon: i-lucide-shield-check
      - name: ...не запутаетесь в бумажном ежедневнике или заметках в телефоне
        description: Все ваше расписание, клиенты и услуги в единой системе.
        icon: i-lucide-notebook
features:
  headline: Преимущества, которые вы оцените с первого дня
  title: Сфокусируйтесь на любимом деле. Организационные вопросы мы возьмём на себя.
  description: Мы создали сервис, который заменит вам личного ассистента и освободит от рутины. Всё, что нужно для комфортной работы с клиентами, — в одной простой системе.
  items:
    - title: Всё в одном месте
      description: Календарь, клиентская база, история услуг, финансы и напоминания. Больше не нужно переключаться между чатами, заметками и таблицами.
      icon: i-lucide-layout-grid
    - title: Ваша профессиональная визитка в сети
      description: Персональная страница с услугами, фото, отзывами и онлайн-записью. Повышает доверие и позволяет клиентам записаться в любое время, даже ночью.
      icon: i-lucide-globe
    - title: Запись и оплата без вашего участия
      description: Клиенты сами выбирают удобное время, вносят предоплату и получают автоматические напоминания. Вы просто приходите на приём.
      icon: i-lucide-calendar-check
    - title: Работает на любом устройстве
      description: Всё управляется через браузер на компьютере или телефоне. Ничего не нужно скачивать и долго настраивать.
      icon: i-lucide-smartphone
    - title: Цена, которая не кусается
      description: Вы платите только за необходимый функционал частного мастера, без переплаты за возможности крупного бизнеса.
      icon: i-lucide-wallet
    - title: Защита от неявок и пустых окон
      description: Настройка предоплаты или депозита при бронировании снижает количество отмен. Ваше время становится финансово защищённым.
      icon: i-lucide-shield-check
testimonials:
  headline: Истории успеха
  title: Истории успеха
  description: Цитаты от реальных специалистов с фото и указанием профессии.
  items:
    - quote: Раньше половину рабочего дня тратила на согласование времени в WhatsApp. Теперь клиенты записываются сами, даже ночью. Выросла и дисциплина — отмен стало меньше.
      user:
        name: Анна
        description: Мастер перманентного макияжа
        avatar:
          src: https://i.pravatar.cc/120?img=1
    - quote: Как косметолог, веду приём по записи. Календарь помогает видеть загрузку на месяц вперёд, а автоматические напоминания снизили количество пропущенных визитов на 80%.
      user:
        name: Дмитрий
        description: Косметолог
        avatar:
          src: https://i.pravatar.cc/120?img=2
    - quote: Предоплата через систему — это спасение. Клиенты стали серьезнее относиться к записи, а я больше не теряю деньги из-за отмен в последний момент. За месяц отмен сократились втрое.
      user:
        name: Елена
        description: Косметолог
        avatar:
          src: https://i.pravatar.cc/120?img=3
    - quote: Раньше вела всё в блокноте и постоянно теряла записи. Теперь у меня профессиональная страница с услугами и онлайн-записью. Клиенты видят портфолио и могут записаться в любое время.
      user:
        name: Виктория
        description: Парикмахер-стилист
        avatar:
          src: https://i.pravatar.cc/120?img=7
    - quote: Как мастер ногтевого сервиса, работаю с постоянным потоком клиентов. Система напоминаний и предоплата помогли структурировать работу и увеличить доход на 30% за счёт снижения отмен.
      user:
        name: Светлана
        description: Мастер ногтевого сервиса
        avatar:
          src: https://i.pravatar.cc/120?img=8
    - quote: Как бровист, я веду запись на коррекцию и окрашивание. Всё в одном месте — расписание, клиенты, история. Клиенты записываются сами, я просто прихожу и работаю.
      user:
        name: Ольга
        description: Бровист
        avatar:
          src: https://i.pravatar.cc/120?img=6
