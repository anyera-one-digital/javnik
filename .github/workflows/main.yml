name: CI/CD

on:
  push:
    branches: [main, master]

env:
  DOCKER_BUILDKIT: 1
  REGISTRY: ${{ secrets.DOCKER_REGISTRY_URL }}
  IMAGE_BACKEND: ${{ secrets.DOCKER_REGISTRY_URL }}/javnik-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKER_REGISTRY_URL }}/javnik-frontend

jobs:
  # =========================
  # Build Backend
  # =========================
  build-backend:
    runs-on: ubuntu-latest
    outputs:
      backend-tag: ${{ github.sha }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PW }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # =========================
  # Build Frontend
  # =========================
  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      frontend-tag: ${{ github.sha }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PW }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NODE_ENV=production
            NUXT_PUBLIC_API_BASE_URL=/api
            API_BASE_URL=http://backend:8000
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # =========================
  # Deploy to Server
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always() && needs.build-backend.result == 'success' && needs.build-frontend.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.IP_SERVER }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          username: ${{ secrets.USER }}
          timeout: 60m
          command_timeout: 60m
          script: |
            cd /home/javnik/projects/javnik

            docker compose -f docker-compose.production.yml pull backend frontend
            docker compose -f docker-compose.production.yml up -d --force-recreate
            docker compose -f docker-compose.production.yml exec backend python manage.py migrate
            docker compose -f docker-compose.production.yml exec backend python manage.py collectstatic --noinput
            docker system prune -af

  # =========================
  # Notify Telegram
  # =========================
  notify-telegram:
    runs-on: ubuntu-latest
    needs: [deploy, build-backend, build-frontend]
    if: always()

    steps:
      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "message=Деплой успешно завершён" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=Деплой не удался" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_API }}
          message: |
            ${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.message }}

            *Проект:* Bookly (javnik)
            *Commit:* ${{ github.sha }}
            *Branch:* ${{ github.ref_name }}
            *Author:* ${{ github.actor }}
            *Workflow:* ${{ github.workflow }}

            [Посмотреть действия →](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          format: markdown
          disable_notification: false
