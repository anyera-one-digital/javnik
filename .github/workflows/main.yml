name: CI/CD

on:
  push:
    branches: [main, master]

env:
  DOCKER_BUILDKIT: 1
  REGISTRY: ${{ secrets.DOCKER_REGISTRY_URL }}
  IMAGE_BACKEND: ${{ secrets.DOCKER_REGISTRY_URL }}/javnik-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKER_REGISTRY_URL }}/javnik-frontend

jobs:
  # =========================
  # Build Backend
  # =========================
  build-backend:
    runs-on: ubuntu-latest
    outputs:
      backend-tag: ${{ github.sha }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PW }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # =========================
  # Build Frontend
  # =========================
  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      frontend-tag: ${{ github.sha }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PW }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NODE_ENV=production
            NUXT_PUBLIC_API_BASE_URL=/api
            API_BASE_URL=http://backend:8000
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # =========================
  # Deploy to Server
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always() && needs.build-backend.result == 'success' && needs.build-frontend.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.IP_SERVER }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          username: ${{ secrets.USER }}
          timeout: 60m
          command_timeout: 60m
          script: |
            cd /home/javnik/projects/javnik

            docker compose -f docker-compose.production.yml pull backend frontend celery_worker
            docker compose -f docker-compose.production.yml up -d --force-recreate
            docker compose -f docker-compose.production.yml exec backend python manage.py migrate
            docker compose -f docker-compose.production.yml exec backend python manage.py collectstatic --noinput
            docker system prune -af

  # =========================
  # Telegram Success Notification
  # =========================
  telegram_success:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - name: Send success message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_API }}
          format: html
          disable_web_page_preview: true
          message: |
            ✨✨✨
            <b>${{ github.actor }}</b> выполнил(а) обновление: <blockquote>${{ github.event.commits[0].message }}</blockquote>
            <a href="https://github.com/${{ github.repository }}/commit/${{github.sha}}">Ссылка</a> на изменения.

            https://javnik.ru успешно обновлён!
            ✨✨✨

  # =========================
  # Telegram Failure Notification
  # =========================
  telegram_failure:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - name: Send failure message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_API }}
          format: html
          disable_web_page_preview: true
          message: |
            <b>${{ github.actor }}</b> попытался выполнить обновление: <blockquote>${{ github.event.commits[0].message }}</blockquote>

            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">📋 Посмотреть логи</a>
            <a href="https://github.com/${{ github.repository }}/commit/${{github.sha}}">🔍 Изменения в коммите</a>

            🚨 https://javnik.ru НЕ обновлён!
