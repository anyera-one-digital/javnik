services:
  db:
    image: postgres:15-alpine
    container_name: javnik_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - javnik_network
    ports:
      - "5430:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookly_user -d bookly_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6-alpine
    container_name: javnik_redis
    volumes:
      - redis_data:/data
    networks:
      - javnik_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: javnik_backend
    volumes:
      - ./backend:/app
      - ./backend/content:/app/content:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - javnik_network
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 bookly_api.asgi:application"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: javnik_frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      NODE_ENV: development
      API_BASE_URL: http://backend:8000
      NUXT_PUBLIC_API_BASE_URL: /api
    depends_on:
      - backend
    networks:
      - javnik_network
    restart: unless-stopped
    command: pnpm dev --host 0.0.0.0 --port 3000

  nginx:
    image: nginx:alpine
    container_name: javnik_nginx
    ports:
      - "8765:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - javnik_network
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: javnik_celery_worker
    volumes:
      - ./backend:/app
      - ./backend/content:/app/content:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - javnik_network
    restart: unless-stopped
    command: celery -A bookly_api worker --loglevel=info --concurrency=2

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: javnik_celery_beat
    volumes:
      - ./backend:/app
      - ./backend/content:/app/content:ro
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - javnik_network
    restart: unless-stopped
    command: celery -A bookly_api beat --loglevel=info

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: javnik_flower
    env_file:
      - .env
    depends_on:
      - redis
      - celery_worker
    networks:
      - javnik_network
    restart: unless-stopped
    command: celery -A bookly_api flower --port=5555
    ports:
      - "5555:5555"

networks:
  javnik_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  frontend_node_modules:
