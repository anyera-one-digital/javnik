services:
  db:
    image: postgres:15-alpine
    container_name: javnik_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - javnik_network
    ports:
      - "5430:5432"

  redis:
    image: redis:8.6-alpine
    container_name: javnik_redis
    volumes:
      - redis_data:/data
    networks:
      - javnik_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: javnik_backend
    volumes:
      - ./backend/content:/app/content:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - javnik_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: javnik_frontend
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - javnik_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: javnik_nginx
    ports:
      - "8765:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - javnik_network
    restart: unless-stopped

networks:
  javnik_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
